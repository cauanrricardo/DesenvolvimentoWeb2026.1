<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>MiniTube Flix</title>
  </head>
  <body>
    <header>
      <h1>MiniTube Flix</h1>
      <p>Sua galeria de vídeos</p>
    </header>

    <main>
      <section>
        <h2>Vídeo em Destaque</h2>
        <figure>
          <video
            controls
            width="640"
            poster="https://via.placeholder.com/640x360?text=Capa+do+Video"
          >
            <source
              src="https://www.w3schools.com/html/mov_bbb.mp4"
              type="video/mp4"
            />
            Seu navegador não suporta a reprodução de vídeos.
          </video>
          <figcaption>Urso Polar Branco - MP4</figcaption>
        </figure>
      </section>

      <hr />

      <section>
        <h2>Explorar Vídeos</h2>

        <div style="display: flex; gap: 20px; flex-wrap: wrap">
          <article>
            <h3>Natureza 01</h3>
            <figure>
              <video controls width="320">
                <source
                  src="https://www.w3schools.com/html/movie.mp4"
                  type="video/mp4"
                />
                Formato não suportado.
              </video>
              <figcaption>Urso Marrom na Natureza- MP4</figcaption>
            </figure>
          </article>

          <article>
            <h3>Animação 02</h3>
            <figure>
              <video controls width="320">
                <source
                  src="https://www.w3schools.com/html/mov_bbb.mp4"
                  type="video/mp4"
                />
                Formato não suportado.
              </video>
              <figcaption>Urso Polar Branco - MP4</figcaption>
            </figure>
          </article>
        </div>
      </section>

      <hr />

      <section>
        <h2>Podcasts / Trilhas</h2>
        <figure>
          <audio controls>
            <source
              src="https://www.w3schools.com/html/horse.mp3"
              type="audio/mpeg"
            />
            Seu navegador não suporta áudio.
          </audio>
          <figcaption>Relincho de Cavalo - Áudio</figcaption>
        </figure>
      </section>
    </main>

    <footer>
      <p>© 2026 - Todos os direitos autorais MiniTubeFlix</p>
    </footer>
  </body>
</html>
