<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição - Encontros Universitários</title>
  </head>
  <body>
    <header>
      <h1>Inscrição de Trabalhos Acadêmicos</h1>
    </header>
    <section>
      <form action="resposta.html" method="post">
        <fieldset>
          <legend>Identificaçao</legend>

          <div>
            <label for="titulo">Título do Trabalho:</label><br />
            <input
              type="text"
              id="titulo"
              name="trabalho_titulo"
              maxlength="100"
              placeholder="Digite o titulo..."
              required
            />
          </div>

          <br />

          <div>
            <label for="resumo">Resumo do Trabalho:</label><br />
            <textarea
              id="resumo"
              name="trabalho_resumo"
              rows="5"
              cols="50"
              maxlength="500"
              placeholder="Descreva seu resumo aqui (max: 500 caracteres)..."
              required
            ></textarea>
          </div>
        </fieldset>

        <br />

        <fieldset>
          <legend>Trilhas e Autoria</legend>

          <div>
            <p>Trilha de Submissão:</p>
            <input
              type="checkbox"
              id="pesquisa"
              name="trilha"
              value="pesquisa"
            />
            <label for="pesquisa">Pesquisa Científica</label><br />

            <input
              type="checkbox"
              id="inovacao"
              name="trilha"
              value="inovacao"
            />
            <label for="inovacao">Inovação e Tecnologia</label><br />

            <input
              type="checkbox"
              id="extensao"
              name="trilha"
              value="extensao"
            />
            <label for="extensao">Extensão Universitária</label><br />

            <input
              type="checkbox"
              id="empreendedorismo"
              name="trilha"
              value="empreendedorismo"
            />
            <label for="empreendedorismo">Empreendedorismo</label><br />

            <input type="checkbox" id="arte" name="trilha" value="arte" />
            <label for="arte">Arte e Cultura</label>
          </div>

          <br />

          <div>
            <label for="autores">Nomes dos Autores:</label><br />
            <input
              type="text"
              id="autores"
              name="trabalho_autores"
              maxlength="200"
              placeholder="Digite os nomes ..."
              required
            />
          </div>

          <br />

          <div>
            <label for="orientador">Orientador Principal:</label><br />
            <select id="orientador" name="orientador">
              <p>\selecione o orientador</p>
              <option value="prof_sidartha">Prof. Sidartha</option>
              <option value="prof_cr">Prof. Cauan Ricardo</option>
              <option value="prof_outro">Outro</option>
            </select>
          </div>
        </fieldset>

        <br />

        <fieldset>
          <legend>Anexos e Adicionais</legend>

          <div>
            <label for="anexo">Link para Anexos (URL):</label><br />
            <input
              type="url"
              id="anexo"
              name="trabalho_url"
              placeholder="https://exemplo.com/arquivo"
            />
          </div>

          <br />

          <div>
            <label for="comentarios">Comentários Adicionais:</label><br />
            <textarea
              id="comentarios"
              name="trabalho_comentarios"
              rows="3"
              cols="50"
              maxlength="300"
              placeholder="Digite aqui (max 300 caracteres)"
            ></textarea>
          </div>
        </fieldset>

        <br />

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </form>
    </section>
  </body>
</html>
