<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição do Participante</title>
  </head>
  <body>
    <header>
      <h1>Inscrição do Participante</h1>
    </header>
    <form action="resposta.html" method="post">
      <fieldset>
        <legend>Dados Pessoais e Preferências</legend>
        <div>
          <label for="id-nome">Nome:</label><br />
          <input
            type="text"
            id="id-nome"
            name="usuario_nome"
            placeholder="Digite seu nome..."
            required
          /><br />
        </div>
        <div>
          <label for="nasc">Data de Nascimento:</label>
          <input type="date" name="usuario_nascimento" id="nasc" />
        </div>
        <div>
          <p>Modalidade:</p>
          <input
            type="radio"
            id="mountain-bike"
            name="modalidade"
            value="mountain-bike"
          />
          <label for="mountain-bike">Mountain Bike</label>

          <input
            type="radio"
            id="ciclismo"
            name="modalidade"
            value="ciclismo"
          />
          <label for="ciclismo">Ciclismo de Estrada</label>
        </div>
        <div>
          <p>Experiência</p>
          <input
            type="radio"
            id="iniciante"
            name="nivel_experiencia"
            value="iniciante"
          />
          <label for="iniciante">Iniciante</label>
          <input
            type="radio"
            id="intermediario"
            name="nivel_experiencia"
            value="intermediario"
          />
          <label for="intermediario">Intermediário</label>
          <input
            type="radio"
            id="avancado"
            name="nivel_experiencia"
            value="avancado"
          />
          <label for="avancado">Avançado</label>
        </div>
        <div>
          <p>Alimentação</p>
          <input type="checkbox" id="agua" name="alimentacao" value="agua" />
          <label for="agua">água</label>

          <input
            type="checkbox"
            id="lanche-rapido"
            name="alimentacao"
            value="lanche-rapido"
          />
          <label for="lanche-rapido">lanche rápido</label>

          <input
            type="checkbox"
            id="lanche-reforcado"
            name="alimentacao"
            value="lanche-reforcado"
          />
          <label for="lanche-reforcado">lanche reforçado</label>

          <input
            type="checkbox"
            id="coca-cola-sem-acucar"
            name="alimentacao"
            value="coca-cola-sem-acucar"
          />
          <label for="coca-cola-sem-acucar">coca-cola sem açúcar</label>

          <input
            type="checkbox"
            id="barra-proteica"
            name="alimentacao"
            value="barra-proteica"
          />
          <label for="barra-proteica">barra proteica</label>
        </div>
        <p>Termos</p>
        <input
          type="checkbox"
          id="termos"
          name="termos"
          value="aceito"
          required
        />
        <label for="termos"
          >Participante leu e aceitou os termos e condições do torneio</label
        >
        <br />
        <button type="submit">Enviar</button>
      </fieldset>
    </form>
  </body>
</html>
